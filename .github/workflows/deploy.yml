name: Deploy to Nominalia via Webhook

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy Webhook
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: 📦 Archive website
      run: |
        rm -rf .git .github Backup scripts py __pycache__ STL
        zip -r web_ocu.zip .
        
    - name: 🚀 Deploy to ocu.cat
      run: |
        curl -X POST --data-binary @web_ocu.zip "https://ocu.cat/github_deploy.php?token=${{ secrets.DEPLOY_TOKEN }}"
