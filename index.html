                const onUp = () => {
                    if (!resizing) return;
                    resizing = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };

                    e.preventDefault(); e.stopPropagation();

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            }

            if (moveHandle) {
                let dragging = false;
                let origin = null;
                const onMove = (e) => {
                    if (!dragging) return;
                    const dx = e.clientX - origin.x;
                    const dy = e.clientY - origin.y;
                    const left = parseFloat(cv.style.left || '0');
                    const top = parseFloat(cv.style.top || '0');

                    cv.style.top = Math.round(origin.top + dy) + 'px';

                };
                const onUp = () => {
                    if (!dragging) return;

                    document.removeEventListener('mouseup', onUp);
                };
                moveHandle.addEventListener('mousedown', (e) => {

                    origin = { x: e.clientX, y: e.clientY, left: pos.left, top: pos.top };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            }

        }

        // Helper: position a maze portal element based on its maze canvas and goal coords (in local canvas space)
        function positionMazePortal(m) {
            if (!m || !m.el || !m.portalEl) return;
            const pos = getElementCanvasPosition(m.el);
            const s = m.scale || 1;
            // Position portal considering scale, keep size updated via transform
            const px = Math.round(pos.left + (m.goalX - m.goalR) * s);
            const py = Math.round(pos.top + (m.goalY - m.goalR) * s);
            m.portalEl.style.left = px + 'px';
            m.portalEl.style.top = py + 'px';
            try {
                m.portalEl.style.transformOrigin = 'top left';
                m.portalEl.style.transform = `scale(${s})`;
            } catch { }
        }

        // Helper: redraw pixel mazes with current color (and update portal position)
        function recolorAllMazes() {
            if (!window.__mazes) return;
            const col = window.__currentElColor || '#111';
            for (const m of window.__mazes) {
                if (!m.el) continue;
                try {
                    const ctx = m.el.getContext('2d');
                    ctx.clearRect(0, 0, m.el.width, m.el.height);
                    ctx.imageSmoothingEnabled = false;
                    ctx.globalAlpha = 0.95;
                    ctx.fillStyle = col;
                    if (Array.isArray(m.pixels)) {
                        for (const r of m.pixels) {
                            ctx.fillRect(r.x, r.y, r.w, r.h);
                        }
                    }
                    ctx.globalAlpha = 1;
                } catch { }
                try { positionMazePortal(m); } catch { }
            }
        }

        // Apply CSS scale for a maze (visual-only) and keep portal/handle aligned
        function applyMazeScale(m, scale) {
            if (!m || !m.el) return;
            m.scale = Math.max(0.25, Math.min(4, scale || 1));
            try {
                m.el.style.transformOrigin = 'top left';
                m.el.style.transform = `scale(${m.scale})`;
            } catch { }
            try { positionMazePortal(m); } catch { }
            try {
                if (m.resizeHandle) {
                    const pos = getElementCanvasPosition(m.el);
                    m.resizeHandle.style.left = Math.round(pos.left + m.el.width * m.scale - 12) + 'px';
                    m.resizeHandle.style.top = Math.round(pos.top + m.el.height * m.scale - 12) + 'px';
                }
                if (m.moveHandle) {
                    const pos = getElementCanvasPosition(m.el);
                    m.moveHandle.style.left = Math.round(pos.left - 2) + 'px';
                    m.moveHandle.style.top = Math.round(pos.top - 2) + 'px';
                }
            } catch { }
        }

        window.clearAllMazes = function () {

                    try { if (m.portalEl && m.portalEl.parentNode) m.portalEl.parentNode.removeChild(m.portalEl); } catch { }
                    try { if (m.resizeHandle && m.resizeHandle.parentNode) m.resizeHandle.parentNode.removeChild(m.resizeHandle); } catch { }
                    try { if (m.moveHandle && m.moveHandle.parentNode) m.moveHandle.parentNode.removeChild(m.moveHandle); } catch { }

        // Helper: render given text to PNG using O-Regular so typography is preserved
        async function downloadTextAsPNG(text, fontSize = 28) {
            try { await document.fonts.load("24px 'O-Regular'"); } catch { }
            const padding = 24; // px
            const lineHeight = Math.round(fontSize * 1.25); // px
            const maxWidth = Math.min(window.innerWidth, 1200) - padding * 2;
            const tmp = document.createElement('canvas');
            const ctx = tmp.getContext('2d');
            ctx.font = `${fontSize}px 'O-Regular', serif`;
            ctx.textBaseline = 'top';
            // simple word-wrap
            const words = (text || '').split(/\s+/);
            const lines = [];
            let line = '';
            for (const w of words) {
                const test = line ? (line + ' ' + w) : w;
                const m = ctx.measureText(test);
                if (m.width > maxWidth && line) {
                    lines.push(line);
                    line = w;
                } else {
                    line = test;
                }
            }
            if (line) lines.push(line);
            const width = Math.ceil(Math.min(maxWidth, Math.max(320, ...lines.map(l => Math.ceil(ctx.measureText(l).width)))) + padding * 2);
            const height = Math.ceil(Math.max(lineHeight, lines.length * lineHeight) + padding * 2);
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const c = canvas.getContext('2d');
            // background white
            c.fillStyle = '#ffffff';
            c.fillRect(0, 0, width, height);
            // text color follows current element color if available
            let color = '#111';
            try { if (window.__currentElColor) color = window.__currentElColor; } catch { }
            c.fillStyle = color;
            c.font = `${fontSize}px 'O-Regular', serif`;
            c.textBaseline = 'top';
            let y = padding;
            for (const l of lines) {
                c.fillText(l, padding, y);
                y += lineHeight;
            }
            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'text_oregular.png';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            }, 'image/png');
        }

        // Place an element randomly within a central safe area
        function placeElementInSafeArea(el) {
            const safeX = Math.floor(window.innerWidth * 0.10);
            const safeW = Math.floor(window.innerWidth * 0.80);
            const safeY = Math.floor(window.innerHeight * 0.18);
            const safeH = Math.floor(window.innerHeight * 0.64);
            // estimate element size and set a temp position
            const estW = 200, estH = 48;
            let left = Math.floor(safeX + Math.random() * Math.max(1, safeW - estW));
            let top = Math.floor(safeY + Math.random() * Math.max(1, safeH - estH));
            el.style.left = left + 'px';
            el.style.top = top + 'px';
            // clamp after render
            requestAnimationFrame(() => {
                const r = el.getBoundingClientRect();
                const maxLeft = safeX + Math.max(0, safeW - r.width);
                const maxTop = safeY + Math.max(0, safeH - r.height);
                const nx = Math.min(Math.max(r.left, safeX), maxLeft);

            const toRight = (r.right + refW + gap) < (c.left + c.width);
            const index = img.dataset.autoIndex ? parseInt(img.dataset.autoIndex, 10) : autoImageIndex++;

// ─── Content Manifest System ──────────────────────────────────────────────────
// Add files to content/<FolderName>/ and push. GitHub Actions auto-generates
// content/manifest.json. Each folder = one interactive word on the canvas.
//
//   .stl files  → right-click opens 3D viewer
//   .pdf files  → click opens PDF viewer
//   image files → click spawns image on canvas (random if multiple)
//
// If a folder has both STL and PDF: click=PDF, right-click=STL

function _spawnImageFile(src, alt) {
    const img = document.createElement('img');
    img.src = src;
    img.alt = alt || '';
    img.draggable = false;
    img.style.position = 'absolute';
    const vw = Math.floor(window.innerWidth / (window.zoomLevel || 1));
    const vh = Math.floor(window.innerHeight / (window.zoomLevel || 1));
    const w = Math.floor(140 + Math.random() * 280);
    const margin = 60;
    img.style.left = Math.max(margin, Math.floor(Math.random() * (vw - w - margin * 2))) + 'px';
    img.style.top = Math.max(margin, Math.floor(Math.random() * (vh - 200 - margin * 2))) + 'px';
    img.style.width = w + 'px';
    img.style.height = 'auto';
    canvas.appendChild(img);
    img.dataset.userMoved = '1';
    try { enhanceImage(img); } catch { }
}

function ensureContentWord(entry) {
    const { word, folder, files } = entry;
    const stlFiles = (files.stl   || []).map(f => `${folder}/${f}`);
    const pdfFiles = (files.pdf   || []).map(f => `${folder}/${f}`);
    const imgFiles = (files.image || []).map(f => `${folder}/${f}`);

    // Special case: newtro uses its own spawn system
    if (word === 'newtro') {
        if (imgFiles.length) window.__newtroFiles = imgFiles;
        return;
    }

    const id = 'cw-' + word.toLowerCase().replace(/[^a-z0-9]/g, '-');

    // Get existing element from HTML, or create a new one dynamically
    let el = document.getElementById(id);
    if (!el) {
        el = document.createElement('a');
        el.id = id;
        el.href = '#';
        el.style.position = 'absolute';
        el.style.fontSize = '24px';
        el.style.letterSpacing = '2px';
        el.style.color = '#333';
        el.style.cursor = 'move';
        el.style.userSelect = 'none';
        canvas.appendChild(el);
        placeElementInSafeArea(el);
    }

    // Skip if already fully initialized (called twice)
    if (el.dataset.cwReady) return;
    el.dataset.cwReady = '1';

    // Apply slot machine effect and drag
    createWordSlotMachine(el, word);
    addWordDragEvents(el);

    const pickRandom = arr => arr[Math.floor(Math.random() * arr.length)];

    const clickAction = () => {
        if (pdfFiles.length) {
            if (typeof previewPDF === 'function') previewPDF(pickRandom(pdfFiles), el);
        } else if (stlFiles.length) {
            if (typeof openStlViewer === 'function') openStlViewer(pickRandom(stlFiles));
        } else if (imgFiles.length) {
            _spawnImageFile(pickRandom(imgFiles), word);
        }
    };

    const rightClickAction = () => {
        if (stlFiles.length) {
            if (typeof openStlViewer === 'function') openStlViewer(pickRandom(stlFiles));
        } else {
            clickAction();
        }
    };

    el.addEventListener('click', (e) => { e.preventDefault(); clickAction(); });
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); rightClickAction(); });
    if (typeof addMobileDoubleTap === 'function') addMobileDoubleTap(el, clickAction);
}

function fetchContentManifest() {
    const manifest = window.CONTENT_MANIFEST;
    if (!Array.isArray(manifest)) return;
    manifest.forEach(entry => {
        try { ensureContentWord(entry); } catch (e) { console.warn('ensureContentWord:', e); }
    });
}

        // Removed createRandomWords function - no more simulated empty words

        function createWordSlotMachine(element, text) {
            element.innerHTML = '';

            text.split('').forEach((letter, index) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = letter;

                const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
                span.classList.add(randomFont);

                element.appendChild(span);

                if (window.__slotFrozen) {
                    return;
                }
                const id = setInterval(() => {
                    fonts.forEach(font => span.classList.remove(font));
                    const newFont = fonts[Math.floor(Math.random() * fonts.length)];
                    span.classList.add(newFont);

                    span.style.transform = 'scaleY(0.8)';
                    setTimeout(() => {
                        span.style.transform = 'scaleY(1)';
                    }, 50);

                }, 300 + (index * 200) + (Math.random() * 200));
                if (!window.__mainIntervals) window.__mainIntervals = [];
                window.__mainIntervals.push(id);
            });
        }

        function addWordDragEvents(element) {
            let wordDragging = false;
            let wordOffset = { x: 0, y: 0 };
            let lastTap = 0;


            // Mouse events (desktop)
            element.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                // Allow scrolling inside PDF viewer; don't start drag from its inner area
                if (element.id === 'pdf-container' && e.target && e.target.closest && e.target.closest('#pdf-js-view')) {
                    return;
                }
                wordDragging = true;

                const rect = element.getBoundingClientRect();
                wordOffset.x = e.clientX - rect.left;
                wordOffset.y = e.clientY - rect.top;

                const moveHandler = (e) => {
                    if (!wordDragging) return;

                    const x = (e.clientX - wordOffset.x) / zoomLevel - panX;
                    const y = (e.clientY - wordOffset.y) / zoomLevel - panY;

                    element.style.left = x + 'px';
                    element.style.top = y + 'px';
                };

                const upHandler = () => {
                    wordDragging = false;
                    document.removeEventListener('mousemove', moveHandler);
                    document.removeEventListener('mouseup', upHandler);
                };

                document.addEventListener('mousemove', moveHandler);
                document.addEventListener('mouseup', upHandler);
            });

            // Touch events (mobile) — instant tap (no 300ms delay)
            element.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) return;
                if (element.id === 'pdf-container' && e.target && e.target.closest && e.target.closest('#pdf-js-view')) {
                    return;
                }

                // Prevent browser 300ms click delay for all word taps
                e.preventDefault();

                const currentTime = Date.now();
                const tapLength = currentTime - lastTap;
                lastTap = currentTime;

                wordDragging = true;
                let hasMoved = false;

                const touch = e.touches[0];
                const touchStartX = touch.clientX;
                const touchStartY = touch.clientY;
                const rect = element.getBoundingClientRect();
                wordOffset.x = touch.clientX - rect.left;
                wordOffset.y = touch.clientY - rect.top;

                const touchMoveHandler = (ev) => {
                    if (!wordDragging || ev.touches.length > 1) return;
                    const t = ev.touches[0];
                    const dx = t.clientX - touchStartX;
                    const dy = t.clientY - touchStartY;
                    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) hasMoved = true;
                    if (!hasMoved) return;
                    ev.preventDefault();
                    const x = (t.clientX - wordOffset.x) / zoomLevel - panX;
                    const y = (t.clientY - wordOffset.y) / zoomLevel - panY;
                    element.style.left = x + 'px';
                    element.style.top = y + 'px';
                };

                const touchEndHandler = () => {
                    wordDragging = false;
                    element.removeEventListener('touchmove', touchMoveHandler);
                    element.removeEventListener('touchend', touchEndHandler);
                    if (!hasMoved) {
                        if (tapLength < 500 && tapLength > 0) {
                            // Double-tap: contextmenu action
                            element.dispatchEvent(new MouseEvent('contextmenu', { bubbles: true, cancelable: true }));
                        } else {
                            // Single tap: click action
                            element.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
                        }
                    }
                };

                element.addEventListener('touchmove', touchMoveHandler, { passive: false });
                element.addEventListener('touchend', touchEndHandler);
            }, { passive: false });
        }

        // Randomize positions of all elements on canvas
        function randomizeAllElements() {
            const rect = canvas.getBoundingClientRect();
            const logicalW = rect.width / zoomLevel;
            const logicalH = rect.height / zoomLevel;

            // Collect movable elements
            const imgs = Array.from(document.querySelectorAll('#canvas img'));
            const words = Array.from(document.querySelectorAll('#canvas a, #currency'));
            const pdf = document.getElementById('pdf-container');

            function logicalSize(el) {
                // Prefer explicit styles for images; fallback to rect/zoom
                let w = parseFloat(el.style.width);

                const maxY = Math.max(0, logicalH - h);

                { symbol: '$', font: 'font-helvetica' },

        // Make PDF modal draggable via its header (do NOT drag inner scrollable area)
        (function setupPdfModalDrag() {
            const modal = document.getElementById('pdf-modal');
            if (!modal) return;
            const header = modal.querySelector('.pdf-header');
            const content = modal.querySelector('.pdf-modal-content') || modal;

            // Ensure modal is absolutely positioned with explicit left/top for moving
            modal.style.position = 'absolute';
            if (!modal.style.left || !modal.style.top) {
                const r = modal.getBoundingClientRect();
                modal.style.left = Math.round(r.left) + 'px';
                modal.style.top = Math.round(r.top) + 'px';
            }
            let dragging = false;
            let offsetX = 0, offsetY = 0;
            let rafQueued = false;
            let targetPos = null;

            // For mouse: allow dragging from almost anywhere (including #pdf-js-view)
            // For touch: keep exclusions so touch scrolling inside the PDF still works
            function isExcludedMouse(target) {
                return !!(target && target.closest && target.closest('.pdf-controls, button, a, input, textarea, select, .pdf-close, .resize-handle-ne, .resize-handle-sw'));
            }
            function isExcludedTouch(target) {
                return !!(target && target.closest && target.closest('#pdf-js-view, .pdf-controls, button, a, input, textarea, select, .pdf-close, .resize-handle-ne, .resize-handle-sw'));
            }

            function applyPos() {
                if (!targetPos) return;
                modal.style.left = targetPos.x + 'px';
                modal.style.top = targetPos.y + 'px';
            }

            function startDrag(clientX, clientY) {
                const r = modal.getBoundingClientRect();
                offsetX = clientX - r.left;
                offsetY = clientY - r.top;
                dragging = true;
                const prev = getComputedStyle(modal).transition;
                modal.dataset.prevTransition = prev;
                modal.style.transition = 'none';
            }
            function endDrag() {
                dragging = false;
                if (modal.dataset.prevTransition !== undefined) {
                    modal.style.transition = modal.dataset.prevTransition;
                    delete modal.dataset.prevTransition;
                }
            }

            function handleMouseDown(e) {
                if (isExcludedMouse(e.target)) return; // let inner controls work normally
                e.preventDefault();
                startDrag(e.clientX, e.clientY);
                const onMove = (e) => {
                    if (!dragging) return;
                    const x = e.clientX - offsetX;
                    const y = e.clientY - offsetY;
                    targetPos = { x, y };
                    if (!rafQueued) {
                        rafQueued = true;
                        requestAnimationFrame(() => { rafQueued = false; applyPos(); });
                    }
                };
                const onUp = () => {
                    endDrag();
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            }
            // Allow drag from header or any blank area of the modal content
            if (header) header.addEventListener('mousedown', handleMouseDown);
            content.addEventListener('mousedown', handleMouseDown);

            function handleTouchStart(e) {
                if (e.touches.length !== 1) return;
                if (isExcludedTouch(e.target)) return; // keep scroll/buttons intact
                const t = e.touches[0];
                startDrag(t.clientX, t.clientY);
                const onMove = (e) => {
                    if (!dragging || e.touches.length !== 1) return;
                    const tt = e.touches[0];
                    const x = tt.clientX - offsetX;
                    const y = tt.clientY - offsetY;
                    targetPos = { x, y };
                    if (!rafQueued) {
                        rafQueued = true;
                        requestAnimationFrame(() => { rafQueued = false; applyPos(); });
                    }
                };
                const onEnd = () => {
                    endDrag();
                    content.removeEventListener('touchmove', onMove);
                    content.removeEventListener('touchend', onEnd);
                };
                content.addEventListener('touchmove', onMove, { passive: false });
                content.addEventListener('touchend', onEnd);
            }
            if (header) header.addEventListener('touchstart', handleTouchStart, { passive: false });
            content.addEventListener('touchstart', handleTouchStart, { passive: false });
        })();

        // Enable Shift+Wheel resize for all images inside #canvas (no frames/handles)
        function enableShiftWheelResize(img) {
            // Ensure explicit width/height so resizing is predictable
            const initWidth = img.clientWidth || img.width || 60;
            const ratio = (img.naturalWidth && img.naturalHeight)
                ? (img.naturalHeight / img.naturalWidth)
                : (img.clientHeight && img.clientWidth ? img.clientHeight / img.clientWidth : 1);
            if (!img.style.width) img.style.width = initWidth + 'px';
            if (!img.style.height) img.style.height = Math.max(1, Math.round(initWidth * ratio)) + 'px';

                if (!(e.shiftKey || e.ctrlKey || e.metaKey)) return; // allow Shift/Ctrl/Cmd
                e.preventDefault();
                e.stopPropagation(); // avoid triggering global canvas zoom
                const current = parseFloat(img.style.width) || img.clientWidth || 60;
                const factor = 1 + (-Math.sign(e.deltaY)) * 0.08; // smooth scaling
                const next = Math.min(3000, Math.max(16, current * factor));
                img.style.width = next + 'px';
                img.style.height = Math.max(1, Math.round(next * ratio)) + 'px';
            }, { passive: false });

            img.addEventListener('dragstart', (e) => e.preventDefault());

        // Convert viewport client coordinates to logical canvas coordinates
        function clientToCanvas(clientX, clientY) {
            const canvasRect = canvas.getBoundingClientRect();

        // Edge/corner drag resize (desktop) and pinch resize (mobile) for images
        function enableEdgeDragResize(img) {
            const EDGE = 10; // px from edge considered resizable zone

                const r = img.getBoundingClientRect();
                const onLeft = (e.clientX - r.left) <= EDGE;
                const onRight = (r.right - e.clientX) <= EDGE;
                const onTop = (e.clientY - r.top) <= EDGE;
                const onBottom = (r.bottom - e.clientY) <= EDGE;

                const d = getDir(e);
                let cursor = '';
                if ((d.right && d.bottom) || (d.left && d.top)) cursor = 'nwse-resize';
                else if ((d.right && d.top) || (d.left && d.bottom)) cursor = 'nesw-resize';
                else if (d.left || d.right) cursor = 'ew-resize';
                else if (d.top || d.bottom) cursor = 'ns-resize';
                else cursor = 'move';

                // capture first to block drag when resizing
            }, { capture: true });

                const d = getDir(e);
                if (!(d.left || d.right || d.top || d.bottom)) return; // not on edge -> normal drag
                e.preventDefault();

                start.width = parseFloat(img.style.width) || (rect.width / zoomLevel);
                start.height = parseFloat(img.style.height) || (rect.height / zoomLevel);

                const p = clientToCanvas(e.clientX, e.clientY);
                const dx = p.x - start.x;
                const dy = p.y - start.y;

                let newWidth = start.width;
                let newHeight = start.height;
                let newLeft = start.left;
                let newTop = start.top;

                if (dir.right) newWidth = Math.max(16, start.width + dx);
                if (dir.bottom) newHeight = Math.max(16, start.height + dy);
                if (dir.left) {
                    newWidth = Math.max(16, start.width - dx);
                    newLeft = start.left + (start.width - newWidth);
                }
                if (dir.top) {
                    newHeight = Math.max(16, start.height - dy);

                    const wFromH = Math.round(newHeight / start.ratio);
                    const w = Math.min(Math.max(16, wFromW), Math.max(16, wFromH));
                    newWidth = w;
                    newHeight = Math.round(w * start.ratio);
                    if (dir.left) newLeft = start.left + (start.width - newWidth);
                    if (dir.top) newTop = start.top + (start.height - newHeight);
                }

                img.style.height = newHeight + 'px';

                img.style.top = newTop + 'px';

                }

        // Pinch resize for mobile

                const h = Math.max(1, Math.round(w * pinch.ratio));

                img.style.height = h + 'px';
            }, { passive: false });

                            break;
                        case 'sw': // bottom-left
                            newWidth = Math.max(200, initialWidth - deltaX);
                            newHeight = Math.max(250, initialHeight + deltaY);
                            newLeft = modal.initialLeft + (initialWidth - newWidth);
                            break;
                        case 'ne': // top-right
                            newWidth = Math.max(200, initialWidth + deltaX);
                            newHeight = Math.max(250, initialHeight - deltaY);
                            newTop = modal.initialTop + (initialHeight - newHeight);
                            break;
                        case 'nw': // top-left
                            newWidth = Math.max(200, initialWidth - deltaX);
                            newHeight = Math.max(250, initialHeight - deltaY);
                            newLeft = modal.initialLeft + (initialWidth - newWidth);
                            newTop = modal.initialTop + (initialHeight - newHeight);
                            break;
                    }

                    modal.style.width = newWidth + 'px';
                    modal.style.height = newHeight + 'px';
                    modal.style.left = newLeft + 'px';
                    modal.style.top = newTop + 'px';
                }
            });

            // Mouse up handler
            document.addEventListener('mouseup', () => {
                isDragging = false;
                isResizing = false;
                resizeDirection = null;
                document.body.style.cursor = 'default';
            });

            // Touch support for drag
            header.addEventListener('touchstart', (e) => {
                if (isResizing || e.touches.length > 1) return;

                isDragging = true;
                const touch = e.touches[0];
                const rect = modal.getBoundingClientRect();
                dragOffset.x = touch.clientX - rect.left;
                dragOffset.y = touch.clientY - rect.top;

                e.preventDefault();
            });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length > 1) return;

                const touch = e.touches[0];
                const x = touch.clientX - dragOffset.x;
                const y = touch.clientY - dragOffset.y;

                const maxX = window.innerWidth - modal.offsetWidth;
                const maxY = window.innerHeight - modal.offsetHeight;

                const boundedX = Math.max(0, Math.min(x, maxX));
                const boundedY = Math.max(0, Math.min(y, maxY));

                modal.style.left = boundedX + 'px';
                modal.style.top = boundedY + 'px';

                e.preventDefault();
            });

            document.addEventListener('touchend', () => {
                isDragging = false;
                isResizing = false;
                resizeDirection = null;
            });
        }

        // Function to open PDF preview as floating element
        function previewPDF(filePath, anchorEl) {
            const modal = document.getElementById('pdf-modal');
            const pdfView = document.getElementById('pdf-js-view');
            const pdfContainer = document.getElementById('pdf-container');

            // Position modal near anchor if available, else center of screen
            if (window.innerWidth <= 768) {
                modal.style.left = '';
                modal.style.top = '';
            } else {
                const anchor = (anchorEl && anchorEl.getBoundingClientRect) ? anchorEl : null;
                if (anchor) {
                    const anchorRect = anchor.getBoundingClientRect();
                    const canvasRect = canvas.getBoundingClientRect();
                    const left = Math.round((anchorRect.left - canvasRect.left) / zoomLevel - panX + 100);
                    const top  = Math.round((anchorRect.top  - canvasRect.top)  / zoomLevel - panY + 50);
                    modal.style.left = left + 'px';
                    modal.style.top  = top  + 'px';
                } else {
                    modal.style.left = Math.round((window.innerWidth  - 480) / 2) + 'px';
                    modal.style.top  = Math.round((window.innerHeight - 560) / 4) + 'px';
                }
            }

            // Clear previous render
            if (pdfContainer) {
                pdfContainer.style.position = '';
                pdfContainer.style.left = '';
                pdfContainer.style.top = '';
            }
            pdfView.innerHTML = '';

            // Load and render with PDF.js
            const pdfUrl = filePath || 'content/zines/tao.pdf';
            initPdfJsViewer(pdfUrl);

            // Show the modal (.show = display:flex via CSS)
            modal.classList.add('show');
        }

        // Function to close PDF preview
        function closePdfPreview() {
            const modal = document.getElementById('pdf-modal');
            const pdfView = document.getElementById('pdf-js-view');
            const pdfContainer = document.getElementById('pdf-container');

            modal.classList.remove('show');

            setTimeout(() => {
                // Clear PDF.js render
                if (pdfView) pdfView.innerHTML = '';
                // Reset PDF.js state
                pdfDoc = null;
                pdfCurrentPage = 1;
                pdfRendering = false;
                pdfPendingPage = null;
                // Reset modal completely so it can be reopened
                modal.style.left = '';
                modal.style.top = '';
                modal.style.width = '';
                modal.style.height = '';
                // Clear any stray offsets on container
                if (pdfContainer) {
                    pdfContainer.style.position = '';
                    pdfContainer.style.left = '';
                    pdfContainer.style.top = '';
                }
                // Let CSS control visibility (base: display:none; .show: display:block)
                modal.style.display = '';
            }, 400);
        }

        // -----------------------------
        // PDF.js simple viewer (single-page fit-width)
        // -----------------------------
        let pdfDoc = null;
        let pdfScale = 1;
        let pdfCurrentPage = 1;
        let pdfRendering = false;
        let pdfPendingPage = null;

        // Configure worker
        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.worker.min.js';
        }

        function initPdfJsViewer(url) {
            const container = document.getElementById('pdf-js-view');
            if (!container) return;

            pdfjsLib.getDocument(url).promise.then((doc) => {
                pdfDoc = doc;
                pdfCurrentPage = 1;
                // Render all pages vertically
                renderAllPages(container);
            }).catch((err) => {
                console.error('PDF load error:', err);
            });
        }

        function renderAllPages(container) {
            if (!pdfDoc) return;
            container.innerHTML = '';

            const availableWidth = container.clientWidth || 400;

            const renderPage = (num) => {
                if (num > pdfDoc.numPages) return;
                pdfDoc.getPage(num).then((page) => {
                    const unscaledViewport = page.getViewport({ scale: 1 });
                    const scale = availableWidth / unscaledViewport.width;
                    const viewport = page.getViewport({ scale });

                    // Wrapper per pàgina
                    const pageWrapper = document.createElement('div');
                    pageWrapper.style.padding = '12px 0';
                    pageWrapper.style.background = 'white';
                    pageWrapper.style.display = 'flex';
                    pageWrapper.style.justifyContent = 'center';
                    pageWrapper.style.alignItems = 'center';

                    const canvas = document.createElement('canvas');
                    canvas.style.display = 'block';
                    canvas.style.background = 'white';
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    pageWrapper.appendChild(canvas);
                    container.appendChild(pageWrapper);

                    const ctx = canvas.getContext('2d');
                    // Fons blanc
                    ctx.save();
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();

                    const renderContext = { canvasContext: ctx, viewport };
                    page.render(renderContext).promise.then(() => {
                        renderPage(num + 1);
                    });
                });
            };

            renderPage(1);
        }

        // Direct download function
        function downloadPDF() {
            const a = document.createElement('a');
            a.href = 'content/zines/tao.pdf';
            a.download = 'tao.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Touch support for mobile - simulate right click behavior
        tao.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            dragStarted = false;

            const touch = e.touches[0];
            const rect = tao.getBoundingClientRect();
            offset.x = touch.clientX - rect.left;
            offset.y = touch.clientY - rect.top;

            document.addEventListener('touchmove', touchDrag);
            document.addEventListener('touchend', stopTouchDrag);
        });

        function touchDrag(e) {
            e.preventDefault();
            dragStarted = true;

            const touch = e.touches[0];
            const x = touch.clientX - offset.x;
            const y = touch.clientY - offset.y;

            const maxX = window.innerWidth - tao.offsetWidth;
            const maxY = window.innerHeight - tao.offsetHeight;

            const boundedX = Math.max(0, Math.min(x, maxX));
            const boundedY = Math.max(0, Math.min(y, maxY));

            tao.style.left = boundedX + 'px';
            tao.style.top = boundedY + 'px';
            tao.style.transform = 'none';
        }

        function stopTouchDrag() {
            isDragging = false;
            dragStarted = false;
            document.removeEventListener('touchmove', touchDrag);
            document.removeEventListener('touchend', stopTouchDrag);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Initialize STL viewer on page load
        if (typeof initStlViewer === 'function') {
            initStlViewer();
        }

        // Track which canvas word was clicked/right-clicked so STL spawns near it
        document.addEventListener('click', (e) => {
            const a = e.target.closest && e.target.closest('#canvas a');
            if (a) window.__stlSpawnOriginEl = a;
        }, true);
        document.addEventListener('contextmenu', (e) => {
            const a = e.target.closest && e.target.closest('#canvas a');
            if (a) window.__stlSpawnOriginEl = a;
        }, true);

        // Mobile: rearrange initial inline words into a vertical column
        if (window.isMobile) {
            requestAnimationFrame(() => {
                const colX = 40;
                let y = 120;
                const rowH = 55;
                [
                    'tao', 'color-word', 'newtro-word',
                    'cw-ocu', 'cw-ocu3d', 'cw-zines',
                    'serp-word', 'soroboru-word', 'afegir-word',
                    'arxius-word', 'tecla-link-word', 'ordre-word'
                ].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.style.position = 'absolute';
                    el.style.left = colX + 'px';
                    el.style.top = y + 'px';
                    el.style.transform = '';
                    y += rowH;
                });
                const aboutBtn = document.getElementById('about-btn');
                if (aboutBtn) { aboutBtn.style.left = '20px'; aboutBtn.style.top = '20px'; }
            });
        }
    </script>
